services:
  - type: web
    name: dashdrive-logistics-engine
    runtime: node
    plan: starter
    region: ohio
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Set securely in Render dashboard
      - key: JWT_SECRET
        sync: false # Set securely in Render dashboard
      - key: PORT
        value: 10000
    healthCheckPath: /api/v1/do