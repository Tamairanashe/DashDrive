apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashdrive-backend
  namespace: dashdrive
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dashdrive-backend
  template:
    metadata:
      labels:
        app: dashdrive-backend
    spec:
      containers:
        - name: backend
          image: gcr.io/dashdrive-prod/mobility-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dashdrive-db-secret
                  key: database-url
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashdrive-backend-service
  namespace: dashdrive
spec:
  selector:
    app: dashdrive-backend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
