version: '3.8'

services:
  backend:
    build: 
      context: ../dashdrive-mobility-backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://dashdrive:dashdrive@postgres:5432/dashdrive?schema=public
    depends_on:
      - postgres

  admin:
    build:
      context: ../dashdrive-admin-panel
      dockerfile: Dockerfile
    ports:
      - "5173:5173"

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: dashdrive
      POSTGRES_PASSWORD: dashdrive
      POSTGRES_DB: dashdrive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
