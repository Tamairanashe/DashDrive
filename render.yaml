# Render Blueprint for DashDrive Monorepo
# This file defines the infrastructure for the entire DashDrive stack.
# Render automatically detects this file at the repository root.

services:
  # ==========================================
  # 1. BACKEND SERVICES
  # ==========================================

  # Main Shared Backend (Legacy Node.js)
  - type: web
    name: dashdrive-backend
    runtime: node
    plan: free
    rootDir: services/core-deprecated
    buildCommand: pnpm install && pnpm run build
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_VERSION
        value: 22

  # Logistics Engine (NestJS + Prisma)
  - type: web
    name: dashdrive-logistics-engine
    runtime: node
    plan: starter
    rootDir: services/logistics-engine
    buildCommand: pnpm install && npx prisma generate && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 22

  # Admin Backend (NestJS + Prisma)
  - type: web
    name: dashdrive-admin-api
    runtime: node
    plan: free
    rootDir: services/admin-api
    buildCommand: pnpm install && npx prisma generate && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 22

  # Mobility Backend (Firebase + Prisma)
  - type: web
    name: dashdrive-mobility-backend
    runtime: node
    rootDir: services/mobility
    plan: free
    buildCommand: pnpm install && npx prisma generate && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: PORT
        value: 3003
      - key: NODE_VERSION
        value: 22

  # Platform Backend (Super-App Engine)
  - type: web
    name: dashdrive-platform-backend
    runtime: node
    rootDir: services/platform
    plan: free
    buildCommand: pnpm install && npx prisma generate && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: PORT
        value: 3004
      - key: NODE_VERSION
        value: 22

  # Finance Backend (New)
  - type: web
    name: dashdrive-finance-backend
    runtime: node
    rootDir: services/finance
    plan: free
    buildCommand: pnpm install && npx prisma generate && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3005
      - key: NODE_VERSION
        value: 22

  # POS Integration Service (New)
  - type: web
    name: dashdrive-pos-integration
    runtime: node
    rootDir: services/pos-integration
    plan: free
    buildCommand: pnpm install && npx prisma generate && pnpm run build
    startCommand: pnpm run start:prod
    envVars:
      - key: PORT
        value: 3006
      - key: NODE_VERSION
        value: 22

  # ==========================================
  # 2. FRONTEND SERVICES (NON-VERCEL)
  # ==========================================

  # Admin Dashboard (Vite Static)
  - type: web
    name: dashdrive-web-admin
    runtime: static
    rootDir: apps/web/admin
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_ADMIN_API_URL
        value: https://dashdrive-admin-api.onrender.com/api

  # Fintech Admin (New)
  - type: web
    name: dashdrive-fintech-admin
    runtime: static
    rootDir: apps/web/fintech-admin
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist

  # Events Dashboard (New - Fullstack/Express)
  - type: web
    name: dashdrive-events-dashboard
    runtime: node
    rootDir: apps/web/events-dashboard
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: PORT
        value: 3010
      - key: NODE_VERSION
        value: 22

  # Landing Page (New)
  - type: web
    name: dashdrive-landing-page
    runtime: static
    rootDir: apps/web/landing-page
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist

  # Rental Portal (New)
  - type: web
    name: dashdrive-rental-portal
    runtime: node
    rootDir: apps/web/rental
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: PORT
        value: 3011
      - key: NODE_VERSION
        value: 22
