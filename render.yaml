# Render Blueprint for DashDrive Monorepo
# This file defines the infrastructure for the entire DashDrive stack.
# All services use the repository root (.) as the Root Directory for pnpm workspace compatibility.

services:
  # ==========================================
  # 1. BACKEND SERVICES (Node.js)
  # ==========================================

  # Main Shared Backend (Legacy Node.js)
  - type: web
    name: dashdrive-svc-core
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/svc-core... && pnpm --filter @dashdrive/svc-core run build
    startCommand: pnpm --filter @dashdrive/svc-core run start
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_VERSION
        value: 22

  # Logistics Engine (NestJS + Prisma)
  - type: web
    name: dashdrive-svc-logistics
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/svc-logistics... && pnpm --filter @dashdrive/svc-logistics exec prisma generate && pnpm --filter @dashdrive/svc-logistics run build
    startCommand: pnpm --filter @dashdrive/svc-logistics run start:prod
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 22

  # Admin Backend (NestJS + Prisma)
  - type: web
    name: dashdrive-svc-admin
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/svc-admin... && pnpm --filter @dashdrive/svc-admin exec prisma generate && pnpm --filter @dashdrive/svc-admin run build
    startCommand: pnpm --filter @dashdrive/svc-admin run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 22

  # Mobility Backend (Firebase + Prisma + Canvas)
  - type: web
    name: dashdrive-svc-mobility
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --filter @dashdrive/svc-mobility... && pnpm --filter @dashdrive/svc-mobility exec prisma generate && pnpm --filter @dashdrive/svc-mobility rebuild canvas && pnpm --filter @dashdrive/svc-mobility run build
    startCommand: pnpm --filter @dashdrive/svc-mobility run start:prod
    envVars:
      - key: PORT
        value: 3003
      - key: NODE_VERSION
        value: 22

  # Platform Backend (Super-App Engine)
  - type: web
    name: dashdrive-svc-platform
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --filter @dashdrive/svc-platform... && pnpm --filter @dashdrive/svc-platform exec prisma generate && pnpm --filter @dashdrive/svc-platform run build
    startCommand: pnpm --filter @dashdrive/svc-platform run start:prod
    envVars:
      - key: PORT
        value: 3004
      - key: NODE_VERSION
        value: 22

  # Finance Backend (Express + Prisma)
  - type: web
    name: dashdrive-svc-finance
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --filter @dashdrive/svc-finance... && pnpm --filter @dashdrive/svc-finance exec prisma generate && pnpm --filter @dashdrive/svc-finance run build
    startCommand: pnpm --filter @dashdrive/svc-finance run start
    envVars:
      - key: PORT
        value: 3005
      - key: NODE_VERSION
        value: 22

  # POS Integration Service (NestJS + Prisma)
  - type: web
    name: dashdrive-svc-pos
    runtime: node
    rootDir: .
    plan: free
    buildCommand: pnpm install --filter @dashdrive/svc-pos... && pnpm --filter @dashdrive/svc-pos exec prisma generate && pnpm --filter @dashdrive/svc-pos run build
    startCommand: pnpm --filter @dashdrive/svc-pos run start:prod
    envVars:
      - key: PORT
        value: 3006
      - key: NODE_VERSION
        value: 22

  # ==========================================
  # 2. FRONTEND SERVICES (Static & Fullstack)
  # ==========================================

  # Admin Dashboard (Vite Static)
  - type: web
    name: dashdrive-web-admin
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-admin... && pnpm --filter @dashdrive/web-admin run build
    staticPublishPath: apps/web/admin/dist
    envVars:
      - key: VITE_ADMIN_API_URL
        value: https://dashdrive-svc-admin.onrender.com/api

  # Fintech Admin (Vite Static)
  - type: web
    name: dashdrive-web-fintech
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-fintech... && pnpm --filter @dashdrive/web-fintech run build
    staticPublishPath: apps/web/fintech-admin/dist

  # Marketplace Portal (Vite Static)
  - type: web
    name: dashdrive-web-marketplace
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-marketplace... && pnpm --filter @dashdrive/web-marketplace run build
    staticPublishPath: apps/web/marketplace/dist

  # Merchant Portal (Vite Static)
  - type: web
    name: dashdrive-web-merchant
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-merchant... && pnpm --filter @dashdrive/web-merchant run build
    staticPublishPath: apps/web/merchant-portal/dist

  # Events Dashboard (Fullstack/Express)
  - type: web
    name: dashdrive-web-events
    runtime: node
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-events... && pnpm --filter @dashdrive/web-events run build
    startCommand: pnpm --filter @dashdrive/web-events run start
    envVars:
      - key: PORT
        value: 3010
      - key: NODE_VERSION
        value: 22

  # Landing Page (Vite Static)
  - type: web
    name: dashdrive-web-landing
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-landing... && pnpm --filter @dashdrive/web-landing run build
    staticPublishPath: apps/web/landing-page/dist

  # Rental Portal (Fullstack/Express)
  - type: web
    name: dashdrive-web-rental
    runtime: node
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-rental... && pnpm --filter @dashdrive/web-rental run build
    startCommand: pnpm --filter @dashdrive/web-rental run start
    envVars:
      - key: PORT
        value: 3011
      - key: NODE_VERSION
        value: 22

  # Food Manager (Vite Static)
  - type: web
    name: dashdrive-web-food
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-food... && pnpm --filter @dashdrive/web-food run build
    staticPublishPath: apps/web/food-manager/dist

  # Car Hire Portal (Vite Static)
  - type: web
    name: dashdrive-web-car-hire
    runtime: static
    rootDir: .
    buildCommand: pnpm install --filter @dashdrive/web-car-hire... && pnpm --filter @dashdrive/web-car-hire run build
    staticPublishPath: apps/web/car-hire-portal/dist
