# Render Blueprint for DashDrive Backend Stack
# This file defines the infrastructure for all backend services.
# Render should automatically detect this file at the repository root.

services:
  # 1. Main Shared Backend (Legacy Node.js)
  - type: web
    name: dashdrive-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_VERSION
        value: 22
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BACKEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # 2. Logistics Engine (NestJS + Prisma)
  - type: web
    name: dashdrive-logistics-engine
    runtime: node
    plan: starter
    rootDir: dashdrive-logistics-engine
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: SYSTEM_API_KEY
        sync: false
      - key: REDIS_HOST
        value: localhost

  # 3. Admin Backend (NestJS + Prisma)
  - type: web
    name: dashdrive-admin-backend
    runtime: node
    plan: free
    rootDir: dashdrive-admin-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: DashdriveMart_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PAYNOW_ID_USD
        sync: false
      - key: PAYNOW_KEY_USD
        sync: false
      - key: PAYNOW_ID_ZIG
        sync: false
      - key: PAYNOW_KEY_ZIG
        sync: false

  # 4. Mobility Backend (NestJS + Prisma)
  - type: web
    name: dashdrive-mobility-backend
    runtime: node
    plan: starter
    rootDir: dashdrive-mobility-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3002
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: JWT_SECRET
        sync: false

  # 5. Platform Backend (NestJS + Prisma) - Port 3004
  - type: web
    name: dashdrive-platform-backend
    runtime: node
    plan: starter
    rootDir: dashdrive-platform-backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 3004
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SYSTEM_API_KEY
        sync: false
      - key: LOGISTICS_ENGINE_URL
        value: https://dashdrive-logistics-engine.onrender.com/api/v1

  # 6. Frontends (Static Sites)
  - type: web
    name: dashdrive-admin-panel
    runtime: static
    rootDir: dashdrive-admin-panel
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_ADMIN_API_URL
        value: https://dashdrive-admin-backend.onrender.com/api
      - key: VITE_MOBILITY_API_URL
        value: https://dashdrive-mobility-backend.onrender.com/api
      - key: VITE_LOGISTICS_API_URL
        value: https://dashdrive-logistics-engine.onrender.com/api/v1
      - key: VITE_PLATFORM_API_URL
        value: https://dashdrive-platform-backend.onrender.com/api/v1

  - type: web
    name: mart-merchant-portal
    runtime: static
    rootDir: mart-merchant-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dashdrive-logistics-engine.onrender.com/api/v1

  - type: web
    name: dash-marketplace
    runtime: static
    rootDir: dash-marketplace
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dashdrive-platform-backend.onrender.com/api/v1
