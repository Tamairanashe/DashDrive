version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: dashdrive-mart-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dashdrive_mart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: dashdrive-mart-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: dashdrive-mart-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/dashdrive_mart?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dashdrive_mart_secret_2026
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
